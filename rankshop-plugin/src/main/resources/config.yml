# RankShop configuration
# Placeholders available in command templates below:
#   %player%     -> the buyer's Minecraft username (IGN)
#   %nickname%   -> the nickname purchased (CUSTOM rank only)
#   %color%      -> the purchased color, converted to a Minecraft §x hex sequence

api:
  # Base URL of your backend. The plugin polls <pending-url> for purchases
  # waiting to be applied, and calls <ack-url> to mark one as processed.
  pending-url: "https://website-six-orpin-37.vercel.app/api/pending-purchases"
  ack-url: "https://website-six-orpin-37.vercel.app/api/pending-purchases/ack"
  # Must match the RANKSHOP_API_KEY env var set on the backend, if any.
  # Sent as an "Authorization: Bearer <api-key>" header if non-empty.
  api-key: ""
  poll-interval-seconds: 30
  # HTTP timeout for each poll/ack request.
  request-timeout-seconds: 10

# Console commands run for each rank, in order, with %player% substituted.
# Add/remove/edit freely to match whatever permissions/nickname plugin you use.
ranks:
  vip:
    commands:
      - "lp user %player% parent set vip"
  custom:
    commands:
      - "lp user %player% parent set custom"
    # Run only for purchases that include a nickname/color.
    # Essentials-style example shown; adjust to your nickname plugin's syntax.
    nickname-command: "nick %player% %color%%nickname%"

nickname:
  max-length: 16
  min-length: 3
  # Characters allowed in a nickname (regex character class).
  allowed-pattern: "^[A-Za-z0-9_ ]+$"
  # Case-insensitive substring blacklist (staff-impersonation terms + anything
  # else you want to block). Add more entries as needed.
  blacklist:
    - "admin"
    - "administrator"
    - "owner"
    - "founder"
    - "staff"
    - "moderator"
    - "console"
    - "system"

messages:
  rank-applied: "&a[RankShop] Your &f%rank% &arank has been applied! Thanks for supporting the server."
  nickname-applied: "&a[RankShop] Your custom nickname is now set."
  purchase-queued: "&e[RankShop] A rank purchase for %player% is queued and will apply on next join."

sound:
  enabled: true
  name: "ENTITY_PLAYER_LEVELUP"
  volume: 1.0
  pitch: 1.0

# /rank opens this GUI so players can browse ranks in-game. Purchases still
# happen on the website (Minecraft can't process PayPal directly) — clicking
# an item sends the player a clickable link to store-url.
gui:
  title: "&8&lRank Store"
  size: 27
  store-url: "https://effectsffa.xyz"
  ranks:
    vip:
      slot: 11
      material: IRON_CHESTPLATE
      display-name: "&b&lVIP &7- $4.99"
      lore:
        - "&7Priority queue join"
        - "&7/fly in the FFA world"
        - "&7/hat command"
        - "&72 extra /sethome slots"
        - ""
        - "&eClick to open the store"
    custom:
      slot: 15
      material: NETHER_STAR
      display-name: "&d&lCUSTOM &7- $24.99"
      lore:
        - "&7All VIP perks"
        - "&7Custom nickname"
        - "&7Custom name color"
        - ""
        - "&eClick to open the store"
